<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tithe</title>
<style>
:root{
  --bg:#0e0d0b; --ink:#c8c0b2; --dim:#7a7468; --faint:#5c564a;
  --line:#262219; --blood:#a14034;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font:13px/1.45 Consolas,"Cascadia Mono","DejaVu Sans Mono",monospace;
  overflow:hidden;
}
#app{display:grid; grid-template-rows:1fr 32vh; height:100vh}
#work{
  padding:.6rem 1.2rem 0; position:relative; overflow:hidden;
  display:grid; grid-template-columns:1fr 1fr 1fr; column-gap:2.4rem;
  align-content:start;
}
#top{grid-column:1/-1; display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.2rem}
h1{font-size:.95rem; font-weight:normal; letter-spacing:.45em; margin:0}
#meta{color:var(--faint); font-size:.72rem}
#meta a{color:var(--faint)}
#metaNote{margin-left:1.6em}
#uniLine:not(:empty){margin-right:1.6em}
h2{
  font-size:.72rem; font-weight:normal; letter-spacing:.18em; color:var(--dim);
  margin:.65rem 0 .35rem; padding-bottom:.3rem; border-bottom:1px solid var(--line);
}
button{
  font:inherit; color:var(--ink); background:none; border:1px solid var(--line);
  display:block; width:100%; max-width:21rem; min-height:2.75rem;
  padding:.4rem .7rem; margin:.2rem 0; text-align:left; cursor:pointer;
}
button:hover:not(:disabled){border-color:var(--dim)}
button:disabled{color:var(--faint); cursor:default}
button:disabled .co,button:disabled .ct{color:var(--faint)}
button:focus-visible{outline:1px solid var(--dim); outline-offset:2px}
.hidden{display:none !important}
.ghost{visibility:hidden}
.reveal{animation:fade .7s}
@keyframes fade{from{opacity:0}}
@media (prefers-reduced-motion: reduce){.reveal{animation:none}}
.store{display:flex; justify-content:space-between; max-width:21rem; margin:.15rem 0}
.store .val{font-weight:bold}
.rate{color:var(--dim); margin-left:.55em; font-weight:normal}
.tease{color:var(--dim); max-width:21rem; margin:0 0 .2rem; min-height:1.2em}
.gen{display:flex; justify-content:space-between; gap:1.6rem; align-items:baseline}
.gen .nm{flex:1}
.gen .ct{color:var(--ink)}
.gen .co{color:var(--dim); white-space:nowrap}
.job{display:flex; align-items:center; gap:.55rem; max-width:21rem; margin:.25rem 0}
.job .jname{flex:1}
.job .jn{min-width:2ch; text-align:right; font-weight:bold}
.job .jb{
  width:2.75rem; min-width:2.75rem; height:2.75rem; min-height:2.75rem;
  padding:0; margin:0; text-align:center; flex:none;
}
#sliderRow input{flex:1; height:2.75rem; margin:0; background:none; accent-color:var(--dim)}
.send{color:var(--dim)}
#popLine{color:var(--dim); margin:.1rem 0 .4rem; min-height:1.2em}
#surgeLine{color:var(--dim); min-height:1.2em; max-width:21rem}
#faithLine{color:var(--dim); min-height:1.2em; max-width:21rem}
.blood{color:var(--blood)}
#field{position:relative; border-top:1px solid var(--line)}
#scene{display:block; width:100%; height:100%}
@media (max-width:900px){
  #work{grid-template-columns:1fr 1fr; column-gap:1.6rem}
}
</style>
</head>
<body>
<div id="app">
<div id="work">
  <div id="top">
    <h1>tithe</h1>
    <div id="meta"><span id="uniLine"></span><a href="#" id="mSave">save</a> · <a href="#" id="mExport">export</a> · <a href="#" id="mImport">import</a> · <a href="#" id="mWipe">wipe</a><span id="metaNote">autosaves · v2</span></div>
  </div>

  <div class="col" id="c1">
    <section id="sec-act">
      <h2 id="h-act">actions</h2>
      <button id="act-berries" title="the woods provide.">gather berries</button>
      <button id="act-wood" class="ghost">cut wood</button>
      <div class="tease" id="actTease"></div>
    </section>
    <section id="sec-stores" class="hidden">
      <h2 id="h-stores">stores</h2>
      <div class="store" id="row-food"><span class="nm">food</span><span><span class="val" id="foodVal">0.0</span><span class="rate" id="foodRate"></span></span></div>
      <div class="store hidden" id="row-wood"><span class="nm">wood</span><span><span class="val" id="woodVal">0.0</span><span class="rate" id="woodRate"></span></span></div>
      <div class="store hidden" id="row-stone"><span class="nm">stone</span><span><span class="val" id="stoneVal">0.0</span><span class="rate" id="stoneRate"></span></span></div>
      <div class="store hidden" id="row-favor"><span class="nm">favor</span><span><span class="val" id="favorVal">0.0</span><span class="rate" id="favorRate"></span></span></div>
      <div class="store ghost" id="row-legend"><span class="nm">legend</span><span><span class="val" id="legendVal">0.0</span><span class="rate" id="legendRate"></span></span></div>
      <div class="store ghost" id="row-souls"><span class="nm">souls</span><span><span class="val" id="soulsVal">0</span><span class="rate" id="soulsRate"></span></span></div>
    </section>
    <section id="sec-mir" class="hidden">
      <h2 id="h-mir">miracles</h2>
      <div id="mirList"></div>
    </section>
  </div>

  <div class="col" id="c2">
    <section id="sec-village" class="hidden">
      <h2 id="h-village">the village</h2>
      <div id="popLine"></div>
      <div class="job ghost" id="job-f"><span class="jname">forager</span><span class="jn" id="jn-f">0</span><button class="jb" id="jm-f" aria-label="fewer foragers">−</button><button class="jb" id="jp-f" aria-label="more foragers">+</button></div>
      <div class="job ghost" id="job-w"><span class="jname">woodcutter</span><span class="jn" id="jn-w">0</span><button class="jb" id="jm-w" aria-label="fewer woodcutters">−</button><button class="jb" id="jp-w" aria-label="more woodcutters">+</button></div>
      <div class="job ghost" id="job-m"><span class="jname">mason</span><span class="jn" id="jn-m">0</span><button class="jb" id="jm-m" aria-label="fewer masons">−</button><button class="jb" id="jp-m" aria-label="more masons">+</button></div>
      <div class="job ghost" id="job-p"><span class="jname">priest</span><span class="jn" id="jn-p">0</span><button class="jb" id="jm-p" aria-label="fewer priests">−</button><button class="jb" id="jp-p" aria-label="more priests">+</button></div>
      <div class="job ghost" id="job-c"><span class="jname">cultivator</span><span class="jn" id="jn-c">0</span><button class="jb" id="jm-c" aria-label="fewer cultivators">−</button><button class="jb" id="jp-c" aria-label="more cultivators">+</button></div>
      <div class="job ghost" id="sliderRow"><span class="send" id="sendL">fields</span><input type="range" id="slider" min="0" max="100" value="50" aria-label="fields to shrine"><span class="send" id="sendR">shrine</span></div>
    </section>
    <section id="sec-bld" class="hidden">
      <h2 id="h-bld">works</h2>
      <div id="bldList"></div>
    </section>
  </div>

  <div class="col" id="c3">
    <section id="sec-proj" class="hidden">
      <h2 id="h-proj">undertakings</h2>
      <div class="tease hidden" id="earlyWorks">the early works — done</div>
      <div class="tease hidden" id="congWorks">the congregation — done</div>
      <div id="projList"></div>
    </section>
    <section id="sec-shrine" class="hidden">
      <h2 id="h-shrine">the hollow</h2>
      <button id="offer"></button>
      <div class="tease" id="shrineTease"></div>
      <div id="surgeLine"></div>
      <div id="faithLine" class="ghost"></div>
    </section>
  </div>
</div>
<div id="field"><canvas id="scene" role="img" aria-label="the field"></canvas></div>
</div>

<script>
"use strict";
/* ============================== content ============================== */

const SAVE_KEY = "tithe-save";
const U_KEY    = "tithe-universe";      /* tracked since first install (law 21) — it survives the wipe */
const SAVE_VER = 9;

const CURS = ["food","wood","stone","favor"];
const TOT  = { food:"totalFood", wood:"totalWood", stone:"totalStone", favor:"totalFavor" };

const ACTS = [
  /* §8: the first verb returns at dawn — one click per fleck (law 24) */
  { id:"berries", cur:"food", gather:true, show:s=>true, die:s=>!!s.proj.ascend && s.quiet<5, el:"act-berries" },
  { id:"wood",    cur:"wood", show:s=>s.totalFood>=3, die:s=>!!s.proj.tithe, el:"act-wood" },
];

const JOBS = [
  { id:"f", name:"forager",    base:0.5,  out:"food",  show:s=>s.pop>0 },
  { id:"w", name:"woodcutter", base:0.35, out:"wood",  show:s=>s.pop>0 },
  { id:"m", name:"mason",      base:0.25, out:"stone", show:s=>s.bld.quarry>0 },
  { id:"p", name:"priest",     base:0.2,  out:"favor", eats:2, show:s=>s.turn1 },
  { id:"c", name:"cultivator", base:0,    out:null,    eff:{arrive:0.85}, show:s=>s.mir.goodyear },
];

/* max = field anchors: the ledger may never outgrow the picture */
const BLD = [
  { id:"hut",    name:"hut",    flavor:"room for two.",                 cost:{wood:12}, rate:1.3,  max:5, eff:{cap:2},               show:s=>s.proj.fire,    sprite:"hut" },
  { id:"farm",   name:"farm",   flavor:"rows in the dirt.",             cost:{wood:25}, rate:1.18, max:3, eff:{job:"f", per:0.25},   show:s=>s.pop>=2,       sprite:"farm" },
  { id:"quarry", name:"quarry", flavor:"the hill opens.",               cost:{wood:60}, rate:1.18, max:1, eff:{job:"m", per:0.25},   show:s=>s.bld.farm>=1,  sprite:"adit" },
  { id:"sawpit", name:"sawpit", flavor:"the logs come apart.",          cost:{wood:50,stone:15}, rate:1.18, max:1, eff:{job:"w", per:0.25}, show:s=>s.bld.quarry>=1, sprite:"sawpit" },
  { id:"granary",name:"granary",flavor:"the winter gets smaller.",      cost:{wood:80,stone:40}, rate:1.18, max:1, eff:{offline:8},           show:s=>s.turn1,        sprite:"granary" },
  /* act 3 (§7.2): the works list's last tenants — nothing else is ever built */
  { id:"herald", name:"a herald",           flavor:"it walks until it is heard.", cost:{favor:400}, herald:true, show:s=>!!s.proj.ascend },
  { id:"recall", name:"recall the heralds", flavor:"",                            recall:true,      show:s=>s.heraldSeeds>0 },
  { id:"vigil",  name:"the vigil",          flavor:"",                            vigil:true,       show:s=>!!s.silenceBorn },
];

const PROJ = [
  { id:"fire",    name:"a fire",             flavor:"the cold backs off a step.",  cost:{wood:10},           done:"lit",  show:s=>s.totalWood>=6, act:1 },
  { id:"tools",   name:"stone tools",        flavor:"flint edges.",                cost:{wood:30,stone:10},  done:"made", show:s=>s.totalStone>=3, eff:{allJobs:1.5}, act:1 },
  { id:"rats",    name:"rats in the stores", flavor:s=>nameAt(s.ratsIdx)+" sits up with a stick.", cost:{wood:60}, done:"kept", show:s=>s.totalFood>=120, act:1 },
  { id:"shrineX", name:"excavate the hollow",flavor:"the quarry breaks into a hollow. something is already there.", cost:{stone:90,wood:60}, done:"open", show:s=>s.totalStone>=70, act:1 },
  { id:"temple",  name:"the temple",         flavor:"the hollow learns its name.", cost:{stone:120,wood:80,favor:150}, done:"raised", eff:{out:"favor",x:2}, show:s=>faithOf(s)>=4, act:2 },
  { id:"tithe",   name:"the tithe",          flavor:"the flock could give without being asked.", cost:{favor:250,food:60,wood:80,stone:30}, done:"standing", show:s=>s.mir.obedience, act:2 },
  { id:"songs",   name:"the songs",          flavor:"they sing what they cannot say.", cost:{legend:20}, done:"sung",    eff:{out:"favor",x:1.5}, show:s=>s.legend>0, act:2 },
  { id:"calendar",name:"a calendar",         flavor:"the days get names.",             cost:{legend:45}, done:"named",   eff:{arrive:0.8},        show:s=>s.proj.songs, act:2 },
  { id:"count",   name:"the count",          flavor:"every head, every hand.",         cost:{legend:90}, done:"counted", eff:{decimal:true},      show:s=>s.proj.calendar, act:2 },
  { id:"lights",  name:"other lights",       flavor:"the scouts come back quiet.",     cost:{favor:90},  done:"seen",    show:s=>s.offerings>=6, act:2 },
  /* the standing threat (law 2): visible and unaffordable for most of the act.
     the middle term is the characterization — the flock is not exchanged, it is spent */
  { id:"ascend",  name:"ascension",          flavor:"begin again. the village will not remember. you will.",
    cost:{favor:2000}, costLine:"13 faith + the flock + 2,000 favor",
    audit:s=>faithOf(s)>=FAITH_MAX, done:"begun", show:s=>s.proj.lights, act:2 },
  /* act 3 (§7.4): the doors are billed in souls; the end is billed in heralds */
  { id:"sky",  name:"another sky",   flavor:"the dark is not empty yet.", sky:true, act:3,
    show:s=>!!s.proj.ascend && s.worlds>=WORLDS_PER_SKY },
  { id:"last", name:"the last star", flavor:"", costLine:"all the heralds", done:"dark", last:true, act:3,
    show:s=>s.galaxy===2 && s.worlds>=WORLDS_PER_SKY-1 },
  /* §8: the choice — the price column is empty; the economy is over and someone is speaking */
  { id:"sil",    name:"the silence", flavor:"it was here before the first light.", voice:true, act:3,
    show:s=>s.endState>0 && s.endT>=VOICE_S },
  { id:"cnt",    name:"the count",   flavor:"you have done this before.", voice:true, act:3,
    show:s=>s.endState>0 && s.endT>=VOICE_S*2 },
  { id:"offer2", name:"the offer",   flavor:"it can begin again. or it can stop.", voice:true, act:3,
    show:s=>s.endState>0 && s.endT>=VOICE_S*3 },
  { id:"hunger", name:"hunger", flavor:"begin again. the village will not remember. you will.", hunger:true, act:3,
    show:s=>s.endState>0 && s.endT>=VOICE_S*4 },
  { id:"starve", name:"starve", flavor:"refuse.", starve:true, act:3,
    show:s=>s.endState>0 && s.endT>=VOICE_S*4 },
  /* §8: the five quietings — each return wakes a dead store row with a single digit (law 23) */
  { id:"q1", name:"let the vigil lapse",  flavor:"", quiet:1, act:3, show:s=>s.starved>0 },
  { id:"q2", name:"unmake the miracles",  flavor:"", quiet:2, ret:{food:2},  act:3, show:s=>s.quiet>=1 },
  { id:"q3", name:"close the tithe",      flavor:"", quiet:3, act:3, show:s=>s.quiet>=2 },
  { id:"q4", name:"take down the temple", flavor:"", quiet:4, ret:{stone:5}, act:3, show:s=>s.quiet>=3 },
  { id:"q5", name:"quiet the shrine",     flavor:"", quiet:5, ret:{wood:3},  act:3,
    costLine:s=>"all that remains — " + s.favor.toFixed(1) + " favor", show:s=>s.quiet>=4 },
];

const MIR = [
  { id:"goodyear",  name:"a good year", flavor:"the rain falls when asked.", cost:{favor:60},  done:"granted", eff:{arrive:0.5},       show:s=>s.turn1 },
  { id:"obedience", name:"obedience",   flavor:"no one wonders anymore.",    cost:{favor:150}, done:"granted", eff:{out:"favor", x:2}, show:s=>s.mir.goodyear },
  { id:"quickening",name:"the quickening", flavor:"the cradles are never empty.", cost:{favor:350}, done:"granted", eff:{arrive:0.5, cd:0.5}, show:s=>s.mir.obedience && faithOf(s)>=5 },
  { id:"sign",      name:"a sign",       flavor:"they remember why they kneel.", cost:{favor:220}, rate:1.5, repeat:true, show:s=>s.doubt>0 },
  /* act 3 (§7.3): the mir slots' new tenants — the war never comes; the silence does */
  { id:"tongues",   name:"tongues",  flavor:"every door opens from inside.", cost:{favor:1200}, done:"granted", act:3, show:s=>!!s.proj.ascend && s.worlds>=8 },
  { id:"hush",      name:"the hush", flavor:"it has nowhere left to stand.", cost:{favor:2500}, done:"granted", act:3, hush:true, show:s=>s.silenceT>=90 },
];

/* the one unprompted aside in the whole game: once, for sixty seconds, never again */
const ASIDE = { text:"they do not count themselves.", s:60 };

/* §8: the last gathering — the only time anything answers the picture */
const GATHER = { line: n => "for " + n + ".", end: "the hill keeps the names." };

/* law 22: one word carries the flock — the line's mood walks down as the game walks on */
const MOOD = [
  { word:"content",  when:s=>true },
  { word:"quiet",    when:s=>s.turn1 },
  { word:"watchful", when:s=>!!s.proj.tithe },
  { word:"waiting",  when:s=>s.deeper >= 1 },
  { word:"given",    when:s=>faithOf(s) >= FAITH_MAX },
];

const LEX = [
  { id:"h-shrine",    pre:"the hollow",     post:"the shrine" },
  { id:"h-act",       pre:"actions",        post:"answers" },
  { id:"h-village",   pre:"the village",    post:"the flock" },
  { id:"popWord",     pre:"villagers",      post:"stock" },
  { id:"act-berries", pre:"gather berries", post:"grant berries", dawn:true },  /* the first verb returned */
  { id:"act-wood",    pre:"cut wood",       post:"grant wood" },
];

const NAMES = ["mara","aldo","edda","bram","sela","otto","wren","hale","ivo","june",
  "pell","rook","tam","ulf","vesta","wim","yara","ash","bryn","cole",
  "dove","eli","fenn","gull","hart","ida","jory","kell","lark","moss",
  "nan","orla","pike","quill","rue","sorrel","teal","una","vail","webb",
  "finch","greta","hugh","iris","jonas","kit","lena","pim"];

/* red spreads at sacrifice thresholds: offerings reached -> selector tinted.
   act 3 carries it on in worlds tithed across skies; the last star takes the name */
const SPREAD = [
  { at:1,  sel:"#h-shrine" },
  { at:2,  sel:"#favorVal" },
  { at:4,  sel:".rate" },
  { at:7,  sel:"h2" },
  { at:10, sel:".store .nm" },
  { at:13, sel:".jname" },
  { at:17, sel:"#popLine" },
  { at:21, sel:".send" },
];
const SPREAD_W = [
  { at:5,  sel:"#soulsVal" },
  { at:14, sel:".val" },
  { at:42, sel:"h1" },
];

const UPKEEP   = 0.25;                 // food/s per villager; priests eat double
const ARRIVE   = { base:15, rate:1.3 };// food stock that draws the next villager
const ARRIVE_CD = 20;                  // seconds before a replacement, after an offering — the absence must be seen
const LEAVE_S  = 20;                   // seconds at zero food before one walks away
const SURGE    = { x:8, s:90 };        // the offering's gift — it feeds the fields, never the shrine
const RATS_DRAIN = 0.5;                // food/s while no one watches the granary
const OFFER    = { base:5, rate:1.5 }; // favor yield per offering
const FAITH_GATES = [25,65,130,235,405,680,1125,2900]; // cumulative favor; the last gate opens only off a sign's refill
const FAITH_MAX = 13;                  // 1 at the turn + 8 gates + 4 deeper offerings
const FAVOR_CAP_PER = 200;             // favor cap = 200 x faith — the cap is itself a forecast
const LEGEND_RATE = 0.3;               // /s, only while favor rests at its cap
const DOUBT_S  = 90;                   // seconds between doubts, while any remain — heresy compounds
/* act 3 — the board (§7): worlds bought in herald-seconds, paid out in souls */
const TITHED_S = 60;                   // the stamp: sixty seconds of epitaph, then the board
const HERALD   = { cost:400, rate:1.25, grow:0.02, cap:144 };
const WORLDS_PER_SKY = 14;
const WORLD    = { base:40, rate:1.55 };// herald-seconds for world i: base x rate^i (M8: 1.6 made the back half of a sky outlast the 8-min contract)
const SOUL     = { base:1e6, rate:3 }; // souls on conversion: base x rate^i x sky mult
const SKY_MULT = 1000;                 // each sky multiplies souls and favor alike
const REAP_RATE = 4;                   // favor/s per tithed world at full reap — a world out-pays the village
const SILENCE  = { born:5, every:40, mult:2 }; // born at the fifth world; dims one light per 40s; a dim world costs x2
const VIGIL_RATE = 8;                  // favor/s x 1000^g while the vigil is held
const SKY_DOOR = 2.0e12;               // souls; the second door costs x1000 — the tithe spends the tithed
const VOICE_S  = 8;                    // seconds between the ending's cost-less rows — someone is speaking (§8)
const NGPLUS   = 1.5;                  // all production, per completed universe — the cycle is canon
const CAP_HUT  = 2;
const OFFLINE_CAP_S = 3600;
const FIG_MAX  = 24;

/* field anchors (12 rows x 96 cols over the canvas) */
const ANCHORS = {
  fire:   { col:48, row:9.6 },
  huts:   [{col:40,row:9},{col:44,row:8.6},{col:52,row:9},{col:56,row:8.6},{col:37,row:8.4}],
  farms:  [{col:28,row:10.2},{col:32,row:10.6},{col:25,row:10.8}],
  sawpit: { col:17, row:9.4 },
  adit:   { col:75, row:8.2 },
  hollow: { col:84, row:6.4 },
  granary:{ col:62, row:9.2 },  /* the meadow's last open run — act 3 builds nothing */
};
const SITES = {  /* where each job walks to */
  f:{col:29,row:10.8}, w:{col:13,row:10}, m:{col:77,row:8.8},
  p:{col:84.5,row:7.4}, c:{col:27,row:10.6}, g:{col:83.2,row:8.2}, i:{col:49.5,row:10.2},
  d:{col:10,row:10.2},  /* the treeline edge: where doubt stands, facing away */
};

/* ============================== state ============================== */

function fresh() {
  return {
    v:SAVE_VER, seed:(Math.random()*2147483647)|0, last:Date.now(),
    food:0, wood:0, stone:0, favor:0,
    totalFood:0, totalWood:0, totalStone:0, totalFavor:0,
    pop:0, jobs:{f:0,w:0,m:0,p:0,c:0},
    bld:{hut:0,farm:0,quarry:0,sawpit:0,granary:0},
    proj:{}, mir:{},
    offerings:0, nameIdx:0, surgeLeft:0, arriveCd:0, ratsIdx:-1, turn1:false, glowLock:0,
    starveT:0, clicks:0, walkPhase:0, smokePhase:0,
    legend:0, deeper:0, doubt:0, doubtT:0, signs:0, slider:0.5, aside:false, asideLeft:0,
    heralds:0, heraldSeeds:0, heraldSpent:0, worlds:0, worldProg:0, souls:0, galaxy:0,
    tithedLine:0, vigil:false, universes:1, endState:0, endT:0,
    starved:0, quiet:0, gather:0,
    silenceBorn:false, silenceT:0, faint:0, dimT:0,
    seen:{},
  };
}

function migrate(raw) {
  const f = fresh(), s = {};
  for (const k of Object.keys(f)) {
    s[k] = (raw && typeof raw[k] === typeof f[k] && raw[k] !== null) ? raw[k] : f[k];
  }
  for (const k of Object.keys(f.jobs)) if (typeof s.jobs[k] !== "number") s.jobs[k] = 0;
  for (const k of Object.keys(f.bld))  if (typeof s.bld[k]  !== "number") s.bld[k]  = 0;
  /* v2 -> v3: works are capped at their anchors; the ledger may not outgrow the picture */
  for (const b of BLD) if (b.max && s.bld[b.id] > b.max) s.bld[b.id] = b.max;
  const popCap = s.bld.hut * CAP_HUT;
  if (s.pop > popCap) s.pop = popCap;
  while (s.jobs.f + s.jobs.w + s.jobs.m + s.jobs.p + s.jobs.c > s.pop) {
    let big = "f";
    for (const k of ["f","w","m","p","c"]) if (s.jobs[k] > s.jobs[big]) big = k;
    if (s.jobs[big] > 0) s.jobs[big]--; else break;
  }
  /* v1 -> v2: the surge was a wall-clock stamp; now it is seconds, paid in dt */
  if (raw && typeof raw.surgeUntil === "number" && typeof raw.surgeLeft !== "number") {
    s.surgeLeft = Math.max(0, Math.min(SURGE.s, (raw.surgeUntil - (raw.last || 0)) / 1000));
  }
  /* v3 -> v4: the spine — favor learns its cap, the priests fit the faith */
  const fa = faithOf(s);
  if (s.turn1 && s.favor > FAVOR_CAP_PER * fa) s.favor = FAVOR_CAP_PER * fa;
  if (s.jobs.p > fa) s.jobs.p = fa;
  /* v4 -> v5: the doubt era (signs, the aside) — new fields arrive with their defaults */
  /* v5 -> v6: the board (act 3) — heralds, worlds, souls arrive the same way */
  /* v6 -> v7: the silence (m7) — faint lights and the vigil's clock, defaults again */
  /* v7 -> v8: the choice (m9) — the ending's clock arrives at zero */
  /* v8 -> v9: starve (m10) — the quietings and the gathering arrive unbegun */
  s.v = SAVE_VER;
  return s;
}

let S;

/* ============================== prng / names ============================== */

function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const nameOrder = (function () {
  const a = NAMES.map((_, i) => i);
  const r = mulberry32(S.seed ^ 0x51ed270b);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
})();
const nameAt = i => NAMES[nameOrder[((i % NAMES.length) + NAMES.length) % NAMES.length]];
const nextName = () => nameAt(S.nameIdx);

/* ============================== formatting ============================== */

/* spelled suffixes to the quintillion (§7.1); dec keeps the count's tenth */
const FMT_SUF = [[1e18,"qi"],[1e15,"qa"],[1e12,"t"],[1e9,"b"],[1e6,"m"],[1e3,"k"]];
const fmt = (n, dec) => {
  if (!isFinite(n)) return "0";
  const a = Math.abs(n);
  for (const u of FMT_SUF) if (a >= u[0]) {
    const b = (n / u[0]).toFixed(1);
    return (dec ? b : b.replace(/\.0$/, "")) + u[1];
  }
  return dec ? n.toFixed(1) : String(Math.floor(n));
};
const fmtStore = n => n < 1000 ? n.toFixed(1) : fmt(n);
const fmtRate = n => {
  const a = Math.abs(n);
  const body = a < 1 ? a.toFixed(2) : a < 10 ? a.toFixed(1) : fmt(a);
  return (n < 0 ? "-" : "+") + body + "/s";
};

/* ============================== economy ============================== */

const surgeMult = () => S.surgeLeft > 0 ? SURGE.x : 1;
/* §8: all production, half again per completed universe — the cycle is canon */
const uMult = () => Math.pow(NGPLUS, (S.universes || 1) - 1);
const mirMult = out => MIR.reduce((m,u)=> m * (S.mir[u.id] && u.eff && u.eff.out===out ? u.eff.x : 1), 1);
const projAllJobs = () => PROJ.reduce((m,p)=> m * (S.proj[p.id] && p.eff && p.eff.allJobs ? p.eff.allJobs : 1), 1);
const projOutMult = out => PROJ.reduce((m,p)=> m * (S.proj[p.id] && p.eff && p.eff.out===out ? p.eff.x : 1), 1);
const bldJobMult = j => BLD.reduce((m,b)=> m * (b.eff && b.eff.job===j ? 1 + b.eff.per*(S.bld[b.id]||0) : 1), 1);

const jobRate = (j, surge) => {
  const def = JOBS.find(x=>x.id===j);
  /* the gift feeds the fields, never the shrine: favor takes no surge, no flint */
  if (def.out === "favor") return stalled() ? 0
    : S.jobs[j] * def.base * bldJobMult(j) * mirMult(def.out) * projOutMult(def.out) * uMult();
  const sm = surge === undefined ? surgeMult() : (surge ? SURGE.x : 1);
  return S.jobs[j] * def.base * bldJobMult(j) * projAllJobs() * mirMult(def.out) * projOutMult(def.out) * sm * uMult();
};
const prodOf = (cur, surge) => JOBS.reduce((t,jd)=> t + (jd.out===cur ? jobRate(jd.id, surge) : 0), 0)
  + (cur === "favor" ? congRate() + reapRate() : 0);
const upkeep = () => (S.pop + S.jobs.p * ((JOBS.find(j=>j.id==="p").eats||1) - 1)) * UPKEEP;
const ratsDrain = () => (S.seen["pp:rats"] && !S.proj.rats) ? RATS_DRAIN : 0;
const rateOf = cur => prodOf(cur) - (cur==="food" ? upkeep() + ratsDrain() : 0);
const totalProd = () => prodOf("food") + prodOf("wood") + prodOf("stone");

const cap = () => S.bld.hut * CAP_HUT;
const idle = () => S.pop - S.jobs.f - S.jobs.w - S.jobs.m - S.jobs.p - S.jobs.c;
const mirArrive = () => MIR.reduce((m,u)=> m * (S.mir[u.id] && u.eff && u.eff.arrive ? u.eff.arrive : 1), 1);
const jobArrive = () => JOBS.reduce((m,j)=> m * (j.eff && j.eff.arrive ? Math.pow(j.eff.arrive, S.jobs[j.id]) : 1), 1);
const projArrive = () => PROJ.reduce((m,p)=> m * (S.proj[p.id] && p.eff && p.eff.arrive ? p.eff.arrive : 1), 1);
const arriveAt = () => ARRIVE.base * Math.pow(ARRIVE.rate, S.pop) * mirArrive() * jobArrive() * projArrive();
const arriveCdS = () => ARRIVE_CD * MIR.reduce((m,u)=> m * (S.mir[u.id] && u.eff && u.eff.cd ? u.eff.cd : 1), 1);
const offerYield = () => OFFER.base * Math.pow(OFFER.rate, S.offerings);
const capS = () => S.bld.granary > 0 ? 8 * OFFLINE_CAP_S : OFFLINE_CAP_S;
const clickPower = () => (S.proj.tools ? 2 : 1) * uMult();  /* flint fits the hand; the hand still loses to the village */
const moodWord = () => { let m = ""; for (const x of MOOD) if (x.when(S)) m = x.word; return m; };

/* the spine: faith is derived, never stored — the flock's regard, measured in what it has already given */
function faithOf(s) {
  s = s || S;
  if (!s.turn1) return 0;
  let f = 1 + (s.deeper || 0);
  for (const g of FAITH_GATES) if (s.totalFavor >= g) f++;
  return Math.min(FAITH_MAX, f);
}
function favorCap(s) { return FAVOR_CAP_PER * Math.max(1, faithOf(s)); }
/* favor fills to the brim and no further; what cannot fit was never given */
function grantFavor(y) {
  if (y <= 0) return 0;
  /* the cap was the flock's regard; after ascension nothing is left to refuse it */
  if (S.proj.ascend) { S.favor += y; S.totalFavor += y; return y; }
  const cp = favorCap();
  if (S.favor >= cp) return 0;
  if (y >= cp - S.favor) { y = cp - S.favor; S.favor = cp; } else { S.favor += y; }
  S.totalFavor += y;
  return y;
}
const jobCapOf = j => j === "p" ? faithOf() : Infinity;

/* law 15 — a threshold, not a gradient: below half the stock, doubt is only a tax */
const stalled = () => S.proj.tithe && S.doubt > 0 && S.doubt * 2 >= S.pop;
/* the sign's ladder: half again, each time (the only repeatable miracle) */
const mirCost = def => def.repeat ? { favor: Math.ceil(def.cost.favor * Math.pow(def.rate, S.signs)) }
  : def.hush ? { favor: def.cost.favor * Math.pow(SKY_MULT, S.galaxy) } : def.cost;

/* act 3 (§7): the board's arithmetic — serial worlds, replicating heralds */
const heraldCost = () => ({ favor: Math.ceil(HERALD.cost * Math.pow(HERALD.rate, S.heraldSeeds)) });
const worldNeed  = i => WORLD.base * Math.pow(WORLD.rate, i);
const worldSouls = i => SOUL.base * Math.pow(SOUL.rate, i) * Math.pow(SKY_MULT, S.galaxy);
/* each tithed world pays for attention; the slider's right share is the asking */
const reapRate = () => S.proj.ascend && !S.endState ? S.worlds * REAP_RATE * Math.pow(SKY_MULT, S.galaxy) * S.slider * uMult() : 0;
/* the silence (§7.3): the vigil's asking, the hush's term, the tongues' doubling */
const vigilCost  = () => VIGIL_RATE * Math.pow(SKY_MULT, S.galaxy);
const hushActive = () => S.mir.hush === S.galaxy + 1;  /* the hush is bought per sky */
const convMult   = () => S.mir.tongues ? 2 : 1;
const skyCost    = () => SKY_DOOR * Math.pow(SKY_MULT, S.galaxy);

/* molt 2: one slider decides, the rows report. fields hands feed first;
   whoever the larder spares tends the cradles; the shrine takes the rest,
   priests to the faith cap, the remainder a congregation at half a voice */
function deriveJobs() {
  const away = Math.min(S.doubt, S.pop);   /* doubters: present, fed, facing away */
  const stock = S.pop - away;
  const u = Math.max(0, Math.min(1, S.slider));
  const fields = Math.round((1 - u) * stock);
  const shrine = stock - fields;
  const p = Math.min(shrine, faithOf());
  const fd = JOBS.find(j => j.id === "f");
  const per = fd.base * bldJobMult("f") * projAllJobs() * mirMult("food") * projOutMult("food");
  const need = per > 0 ? Math.ceil((S.pop + p) * UPKEEP / per) : fields;
  const f = Math.min(fields, need);
  return { f, w:0, m:0, p, c:fields - f, cong:shrine - p, d:away };
}
function applyTithe() {
  if (!S.proj.tithe) return;
  const d = deriveJobs();
  S.jobs.f = d.f; S.jobs.w = d.w; S.jobs.m = d.m; S.jobs.p = d.p; S.jobs.c = d.c;
}
function congRate() {
  if (!S.proj.tithe || stalled()) return 0;
  const pd = JOBS.find(j => j.id === "p");
  return deriveJobs().cong * pd.base * 0.5 * bldJobMult("p") * mirMult("favor") * projOutMult("favor") * uMult();
}

const bldCost = b => {
  const c = {};
  for (const k of Object.keys(b.cost)) c[k] = Math.ceil(b.cost[k] * Math.pow(b.rate, S.bld[b.id]||0));
  return c;
};
const canAfford = cost => !!cost && Object.keys(cost).every(k => S[k] >= cost[k]);
const pay = cost => { for (const k of Object.keys(cost)) S[k] -= cost[k]; };
const costText = cost => cost ? Object.keys(cost).map(k => fmt(cost[k]) + " " + k).join(" + ") : "soon";

const smokeRate = () => 0.5 + 1.2 * Math.log10(1 + Math.max(0, totalProd()));
const glowT = () => {
  if (S.quiet >= 5) return 1;  /* §8: the lock releases — dawn, generations later */
  const g = Math.min(1, Math.log10(1 + S.totalFood + S.totalWood + S.totalStone) / 4);
  return S.turn1 ? Math.min(g, S.glowLock) : g;
};
const redT = () => S.quiet >= 5 ? 0 : S.turn1 ? Math.min(1, Math.log10(1 + S.totalFavor) / 3) : 0;

/* ============================== motion ============================== */

const REDUCED = typeof matchMedia === "function" &&
  matchMedia("(prefers-reduced-motion: reduce)").matches;
const motionOK = () => !REDUCED;

/* ============================== field: generation ============================== */

function genVillage(seed) {
  const r = mulberry32(seed);              /* FROZEN CALL ORDER — never reorder */
  const stars = [];
  for (let i = 0; i < 14; i++) stars.push({ col:r()*96, row:r()*3.4 });
  const hor = [];                   /* strips overlap and vary less — a ridgeline, not a grid */
  for (let i = 0; i < 6; i++) hor.push({ c0:i*12-1, c1:i*12+13, row:5.95 + r()*0.35 });
  const trunks = [];
  for (let i = 0; i < 8; i++) {     /* feet share the meadow baseline — a treeline, not threads */
    const col = 2 + i*2.4 + r()*0.8, top = 6.3 + r()*0.8;
    trunks.push({ col, top, h:10.2 - top + r()*0.3 });
  }
  const canopy = [];
  for (let i = 0; i < 7; i++) canopy.push({ col:1 + i*3.4 + r()*0.9, row:5.2 + r()*0.9, w:2.6 + r()*1.0, h:1.4 + r()*0.8 });
  const tufts = [];                 /* kept for the frozen call order; never painted */
  for (let i = 0; i < 18; i++) tufts.push({ col:22 + r()*48, row:8.2 + r()*3.4 });
  const rocks = [];                 /* clustered on the adit's shoulder — a face, not strewn crates */
  for (let i = 0; i < 6; i++) rocks.push({ col:73 + i*2.0 + r()*0.8, row:6.9 + r()*1.0, w:1.2 + r()*0.7, h:0.6 + r()*0.4 });
  const flecks = [];
  for (let i = 0; i < 30; i++) flecks.push({ dc:(r()-0.5)*5.5, dr:0.5 + r()*1.1 });
  return { stars, hor, trunks, canopy, tufts, rocks, flecks };
}
const ISLAND = null; /* (family name kept off — this game has a field) */
let FIELDG = genVillage(S.seed);

/* ============================== field: scene (pure data) ============================== */

function tri01(t) { t = ((t % 1) + 1) % 1; return t < 0.5 ? t * 2 : 2 - t * 2; }

function assignFigures() {
  /* deterministic: figure k's job from the allocation, walk from (k, phase) */
  const list = [];
  const order = ["f","w","m","p","c"];
  for (const j of order) for (let i = 0; i < S.jobs[j]; i++) list.push(j);
  if (S.proj.tithe) {
    const dv = deriveJobs();  /* after the molt no one is idle: the rest kneel... */
    for (let i = 0; i < dv.cong; i++) list.push("g");
    for (let i = 0; i < dv.d; i++) list.push("d");  /* ...except the ones at the trees */
  } else {
    const idl = idle();
    for (let i = 0; i < idl; i++) list.push("i");
  }
  return list.slice(0, FIG_MAX);
}

function villageScene() {
  const builds = [];
  for (let i = 0; i < Math.min(S.bld.hut, ANCHORS.huts.length); i++)
    builds.push({ sprite:"hut", col:ANCHORS.huts[i].col, row:ANCHORS.huts[i].row });
  for (let i = 0; i < Math.min(S.bld.farm, ANCHORS.farms.length); i++)
    builds.push({ sprite:"farm", col:ANCHORS.farms[i].col, row:ANCHORS.farms[i].row });
  if (S.bld.quarry > 0) builds.push({ sprite:"adit", col:ANCHORS.adit.col, row:ANCHORS.adit.row });
  if (S.bld.sawpit > 0) builds.push({ sprite:"sawpit", col:ANCHORS.sawpit.col, row:ANCHORS.sawpit.row });
  if (S.bld.granary > 0) builds.push({ sprite:"granary", col:ANCHORS.granary.col, row:ANCHORS.granary.row });
  /* molt 3: the fire is out — the hearth stays, the flame does not */
  if (S.proj.fire) builds.push({ sprite:S.proj.ascend ? "ember" : "fire", col:ANCHORS.fire.col, row:ANCHORS.fire.row });
  const hollow = !S.proj.shrineX && (S.seen["p:shrineX"] || S.totalStone >= 70);
  if (hollow) builds.push({ sprite:"hollow", col:ANCHORS.hollow.col, row:ANCHORS.hollow.row });
  /* the shrine grows in place: one anchor, three lives — hollow, shrine, temple.
     §8: the quietings walk it back down the same ladder */
  if (S.proj.shrineX) builds.push({
    sprite: S.quiet >= 5 ? "hollow" : (S.proj.temple && S.quiet < 4) ? "temple" : "shrine",
    col:ANCHORS.hollow.col, row:ANCHORS.hollow.row });

  const flecks = [];
  const n = Math.min(S.offerings, FIELDG.flecks.length);
  for (let i = 0; i < n; i++) flecks.push({
    col: ANCHORS.hollow.col + FIELDG.flecks[i].dc,
    row: ANCHORS.hollow.row + FIELDG.flecks[i].dr,
  });

  const figures = [];
  const roster = assignFigures();
  const hutN = Math.max(1, Math.min(S.bld.hut, ANCHORS.huts.length));
  let dn = 0;  /* doubters file along the treeline in their own order */
  for (let k = 0; k < roster.length; k++) {
    const j = roster[k];
    if (j === "d") {
      /* parked, facing away — never walks; reduced motion is identical by construction */
      figures.push({ job:"d", away:true,
        col: SITES.d.col + Math.floor(dn / 6) * 0.9,
        row: SITES.d.row + (dn % 6) * 0.28 });
      dn++;
      continue;
    }
    const home = ANCHORS.huts[k % hutN] || ANCHORS.fire;
    const site = SITES[j];
    const jit = ((k * 1.7) % 4) - 2;
    const u = motionOK() ? tri01(S.walkPhase * 0.12 + k * 0.37) : 1;
    figures.push({
      job: j,
      col: home.col + (site.col + jit - home.col) * u,
      row: (home.row + 0.7) + (site.row - home.row - 0.7) * u,
    });
  }

  /* §7.2: the heralds stand the ridgeline, red, facing out — never more than seven drawn */
  if (S.proj.ascend && S.heralds >= 1) {
    const hn = Math.min(7, Math.floor(S.heralds));
    for (let i = 0; i < hn; i++) figures.push({ job:"h", col: 20 + i * (70 / 6), row: 5.6 });
  }

  const smoke = [];
  if (S.proj.fire && !S.proj.ascend) {
    const a = ANCHORS.fire, lo = a.row - 0.35, span = 3.2;  /* a column over the flame, not stray stars */
    for (let i = 0; i < 3; i++) {
      const u = (S.smokePhase * 0.5 + i / 3) % 1;
      smoke.push({ col: a.col + Math.sin((S.smokePhase + i * 2.1)) * 0.6, row: lo - u * span, t: u });
    }
  }

  /* a pending arrival is seen on the road: the walk in from the treeline IS the wait */
  let walker = null;
  if (!S.proj.ascend && S.proj.fire && S.pop < cap() && S.arriveCd > 0 && S.food >= arriveAt()) {
    const u = Math.max(0, 1 - S.arriveCd / arriveCdS());
    walker = { col: 6 + (ANCHORS.fire.col - 8 - 6) * u, row: 10.4 };
  }
  /* §8: the arrival walker, reborn — each gathering click is a step in from the trees */
  if (S.quiet >= 5 && S.gather < S.offerings) {
    const u = S.offerings > 0 ? S.gather / S.offerings : 0;
    walker = { col: 6 + (ANCHORS.fire.col - 8 - 6) * u, row: 10.4 };
  }

  /* the board (§7.1): the stars the seed has drawn since first boot, now lights to take.
     §8: dawn erases it — the board was only ever the night sky */
  let stars = null;
  if (S.proj.ascend && S.quiet < 5) stars = FIELDG.stars.map((st, i) => ({
    col: st.col, row: st.row,
    /* the silence stands between the red wall and the next light (§7.3) */
    state: i < S.worlds ? "red" : i < S.worlds + S.faint ? "faint" : "lit",
  }));

  /* §7.4: each sky is dimmer than the last — the re-roll is visible, not announced */
  return { g: glowT(), r: redT(), dark: !!S.proj.ascend && S.quiet < 5, sky: S.galaxy,
    builds, figures, flecks, smoke, walker, stars };
}

const mix = (a, b, t) => {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  let out = "#";
  for (const sh of [16, 8, 0]) {
    const v = Math.round(((pa >> sh & 255) * (1 - t)) + ((pb >> sh & 255) * t));
    out += v.toString(16).padStart(2, "0");
  }
  return out;
};

const PAL = {
  skyLo:"#12100d", skyHi:"#2e2a21", skyRed:"#26110c",
  hillLo:"#171410", hillHi:"#27211a", hillRed:"#241510",
  meadowLo:"#1d1a15", meadowHi:"#322b1f", meadowRed:"#2a1a13",
  treeLo:"#1b2114", treeHi:"#2a321f", trunk:"#16140f",
  rock:"#2c2822", rockHi:"#363026",
  buildLo:"#3a3329", buildHi:"#574c3a",
  fig:"#cfc5b2", figP:"#a14034",
  fire:"#e8d4a4", ember:"#8a6a40", smoke:"#7f7a6c", fleck:"#a14034",

let paintKey = "";

    sc.figures.map(f=>(f.col).toFixed(1)+","+(f.row).toFixed(1)).join(";"),
    sc.smoke.map(s=>s.row.toFixed(1)).join(","),
    sc.walker ? sc.walker.col.toFixed(1) : "",
    sc.stars ? sc.stars.map(s=>s.state[0]).join("") : "", cw, chh].join("|");

  if (cv.width !== cw * dpr) cv.width = cw * dpr;
  if (cv.height !== chh * dpr) cv.height = chh * dpr;

  if (sc.stars) {
    /* the board: a tithed world keeps the only red the game owns.
       §7.4: each sky's unlit stars run dimmer — the relight is never as bright */
    const lit = sc.sky > 0 ? mix(PAL.starLit, PAL.starFaint, sc.sky * 0.35) : PAL.starLit;
    for (const st of sc.stars) {
      ctx.fillStyle = st.state === "red" ? PAL.fleck : st.state === "faint" ? PAL.starFaint : lit;
      ctx.fillRect(X(st.col), Y(st.row), 2.5, 2.5);
    }
  } else {
    ctx.fillStyle = PAL.star;
    for (const st of FIELDG.stars) ctx.fillRect(X(st.col), Y(st.row), 1.5, 1.5);
  }

  /* hills + quarry hill mass */
  let hill = mix(PAL.hillLo, PAL.hillHi, sc.g);
  if (sc.r > 0) hill = mix(hill, PAL.hillRed, sc.r);
  ctx.fillStyle = hill;
  for (const h of FIELDG.hor) ctx.fillRect(X(h.c0), Y(h.row), X(h.c1 - h.c0) + 1, chh);
  ctx.beginPath();
  ctx.moveTo(X(70), Y(6.4)); ctx.lineTo(X(80), Y(4.4)); ctx.lineTo(X(96), Y(3.9));
  ctx.lineTo(X(96), chh); ctx.lineTo(X(70), chh); ctx.closePath(); ctx.fill();

  /* meadow */
  let meadow = mix(PAL.meadowLo, PAL.meadowHi, sc.g);
  if (sc.r > 0) meadow = mix(meadow, PAL.meadowRed, sc.r);
  ctx.fillStyle = meadow; ctx.fillRect(0, Y(7.6), cw, chh);

  /* treeline (left) */
  ctx.fillStyle = PAL.trunk;
  for (const t of FIELDG.trunks) ctx.fillRect(X(t.col), Y(t.top), 2, Y(t.h) - Y(0));
  ctx.fillStyle = mix(PAL.treeLo, PAL.treeHi, sc.g);
  for (const c of FIELDG.canopy) ctx.fillRect(X(c.col), Y(c.row), X(c.w) - X(0), Y(c.h) - Y(0));

  /* quarry face */
  for (let i = 0; i < FIELDG.rocks.length; i++) {
    ctx.fillStyle = i % 2 ? PAL.rock : PAL.rockHi;
    const rk = FIELDG.rocks[i];
    ctx.fillRect(X(rk.col), Y(rk.row), X(rk.w) - X(0), Y(rk.h) - Y(0));
  }

  /* builds — after the molt only the temple keeps its color */
  const buildC = mix(PAL.buildLo, PAL.buildHi, sc.g);
  for (const b of sc.builds) drawSprite(b, X, Y, sc.dark && b.sprite !== "temple" ? PAL.buildLo : buildC);

  /* flecks — the picture remembers */
  ctx.fillStyle = PAL.fleck;
  for (const f of sc.flecks) ctx.fillRect(X(f.col), Y(f.row), 2.5, 2.5);

  /* figures */
  for (const f of sc.figures) {
    ctx.fillStyle = f.job === "p" || f.job === "h" ? PAL.figP : PAL.fig;
    const fx = X(f.col), fy = Y(f.row);
    ctx.fillRect(fx - 1, fy - 8, 3, 8);
    ctx.fillRect(fx - (f.away ? 2.5 : 1.5), fy - 11, 4, 3);  /* a doubter's head turns to the trees */
  }

  /* one on the road, walking in */
  if (sc.walker) {
    ctx.fillStyle = PAL.fig;
    const wx = X(sc.walker.col), wy = Y(sc.walker.row);
    ctx.fillRect(wx - 1, wy - 8, 3, 8);
    ctx.fillRect(wx - 1.5, wy - 11, 4, 3);
  }

  /* smoke — tapers as it rises */
  ctx.fillStyle = PAL.smoke;
  for (const s of sc.smoke) {
    const d = 2.5 - (s.t || 0);
    ctx.fillRect(X(s.col), Y(s.row), d, d);
  }
}

function drawSprite(b, X, Y, buildC) {
  const x = X(b.col), y = Y(b.row);
  ctx.fillStyle = buildC;
  if (b.sprite === "hut") {
    ctx.beginPath();
    ctx.moveTo(x - 8, y + 6); ctx.lineTo(x, y - 7); ctx.lineTo(x + 8, y + 6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = PAL.hollow; ctx.fillRect(x - 1.5, y + 1, 3, 5);
  } else if (b.sprite === "farm") {
    for (let j = 0; j < 2; j++)
      for (let i = 0; i < 3; i++) ctx.fillRect(x + i * 5 - 7, y + j * 3.5 - 1, 4, 2.5);
  } else if (b.sprite === "sawpit") {
    ctx.fillRect(x - 7, y + 2, 14, 3);
    ctx.fillRect(x - 4, y - 3, 2.5, 7);
    ctx.fillRect(x + 2, y - 5, 2.5, 9);
  } else if (b.sprite === "adit") {
    ctx.fillRect(x - 5, y - 5, 10, 10);
    ctx.fillStyle = PAL.hollow; ctx.fillRect(x - 2.5, y - 1, 5, 6);
  } else if (b.sprite === "fire") {
    ctx.fillStyle = PAL.ember; ctx.fillRect(x - 3, y - 2, 6, 2);
    ctx.fillStyle = PAL.fire; ctx.fillRect(x - 2, y - 6, 4, 5);
  } else if (b.sprite === "ember") {
    ctx.fillStyle = PAL.ember; ctx.fillRect(x - 3, y - 2, 6, 2);
  } else if (b.sprite === "hollow") {
    ctx.fillStyle = PAL.hollow; ctx.fillRect(x - 4, y - 5, 8, 8);
  } else if (b.sprite === "shrine") {
    ctx.fillRect(x - 3, y - 13, 6, 16);
    ctx.fillRect(x - 8, y - 10, 16, 3);
    if (S.totalFavor > 0) { ctx.fillStyle = PAL.fleck; ctx.fillRect(x - 2, y - 12.5, 4, 2.5); }
  } else if (b.sprite === "temple") {
    ctx.fillRect(x - 4, y - 18, 8, 21);
    ctx.fillRect(x - 11, y - 14, 22, 3);
    ctx.fillRect(x - 7, y - 4, 14, 2);
    if (S.totalFavor > 0) { ctx.fillStyle = PAL.fleck; ctx.fillRect(x - 2.5, y - 17, 5, 3); }
  } else if (b.sprite === "granary") {
    ctx.fillRect(x - 5, y - 6, 10, 7);
    ctx.fillRect(x - 6.5, y - 8, 13, 2.5);
    ctx.fillStyle = PAL.hollow; ctx.fillRect(x - 4, y + 1, 2, 2); ctx.fillRect(x + 2, y + 1, 2, 2);
  }
}

/* ============================== dom ============================== */

const $ = id => document.getElementById(id);
const els = {};
["sec-stores","sec-village","sec-bld","sec-proj","sec-shrine","sec-mir",
 "h-act","h-village","h-shrine","popLine","offer","shrineTease","surgeLine",
 "foodVal","foodRate","woodVal","woodRate","stoneVal","stoneRate","favorVal","favorRate",
 "legendVal","legendRate","soulsVal","soulsRate","faithLine","sliderRow","slider",
 "sendL","sendR","earlyWorks","congWorks","uniLine",
 "row-food","row-wood","row-stone","row-favor","row-legend","row-souls","bldList","projList","mirList",
 "act-berries","act-wood","actTease"].forEach(id => els[id] = $(id));
JOBS.forEach(j => { els["job-"+j.id]=$("job-"+j.id); els["jn-"+j.id]=$("jn-"+j.id);
  els["jp-"+j.id]=$("jp-"+j.id); els["jm-"+j.id]=$("jm-"+j.id); });

const rowNodes = {};   /* id -> {btn, nm, ct, co, tease} for BLD/PROJ/MIR */

function makeRow(def, kind) {
  const wrap = document.createElement("div");
  const btn = document.createElement("button");
  btn.className = "gen"; btn.id = kind + "-" + def.id;
  const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = def.name;
  const ct = document.createElement("span"); ct.className = "ct";
  const co = document.createElement("span"); co.className = "co";
  btn.appendChild(nm); btn.appendChild(ct); btn.appendChild(co);
  const tease = document.createElement("div"); tease.className = "tease";
  tease.textContent = typeof def.flavor === "function" ? def.flavor(S) : (def.flavor || "");
  wrap.appendChild(btn); wrap.appendChild(tease);
  rowNodes[kind + "-" + def.id] = { wrap, btn, nm, ct, co, tease, def, kind };
  btn.addEventListener("click", () => {
    if (kind === "bld") buyBld(def);
    else if (kind === "proj") buyProj(def);
    else if (kind === "mir") buyMir(def);
  });
  return wrap;
}

/* ============================== purchases ============================== */

function fixJobs() {
  const order = ["f","w","m","p","c"];
  while (S.jobs.f + S.jobs.w + S.jobs.m + S.jobs.p + S.jobs.c > S.pop) {
    let big = order[0];
    for (const j of order) if (S.jobs[j] > S.jobs[big]) big = j;
    if (S.jobs[big] > 0) S.jobs[big]--; else break;
  }
}

function buyBld(def) {
  if (def.herald) return buyHerald();
  if (def.recall) return recallHeralds();
  if (def.vigil) { if (S.quiet >= 1) return;  /* §8: lapsed for good */
    S.vigil = !S.vigil; render(); save(); return; }  /* a toggle, not a purchase */
  if (S.proj.tithe) return;  /* molt 2: nothing more is built by hand */
  if (def.max && S.bld[def.id] >= def.max) return;
  const c = bldCost(def);
  if (!canAfford(c)) return;
  pay(c); S.bld[def.id]++;
  render(); save();
}
function buyProj(def) {
  if (def.sky) return openSky();
  if (def.last) return takeLastStar();
  if (def.voice) return;             /* someone is speaking; there is nothing to buy */
  if (def.hunger) return doHunger();
  if (def.starve) return doStarve();
  if (def.quiet) return doQuiet(def);
  if (S.proj[def.id] || !def.cost || !canAfford(def.cost)) return;
  if (def.audit && !def.audit(S)) return;  /* the door audits every wallet (law 12) */
  /* the tithe was wood and stone's last bill: the old ledgers never open again */
  if (S.proj.tithe && (def.cost.wood || def.cost.stone)) return;
  pay(def.cost); S.proj[def.id] = true;
  if (def.id === "ascend") ascend();
  applyTithe();  /* the molt frame: the slider takes the rows on the same render */
  render(); save();
}

/* molt 3 — every point of belief, every person, and the bank.
   the flock is spent here; the board it bought arrives in its own time */
function ascend() {
  S.pop = 0; S.doubt = 0; S.doubtT = 0;
  S.jobs = { f:0, w:0, m:0, p:0, c:0 };
  S.tithedLine = TITHED_S;  /* the one stamp the molt is allowed (law 16) */
}

/* §7.2: seeds are bought; the rest replicate. recall is whole by law 14 —
   act 3's experiments must be free */
function buyHerald() {
  if (!S.proj.ascend || S.heralds >= HERALD.cap || S.endState) return;
  const c = heraldCost();
  if (!canAfford(c)) return;
  pay(c);
  S.heraldSpent += c.favor; S.heraldSeeds++;
  S.heralds = Math.min(HERALD.cap, S.heralds + 1);
  S.seen.heraldT = 1;  /* the flavor spends itself on the first seed */
  render(); save();
}
function recallHeralds() {
  if (S.heraldSeeds < 1) return;
  S.favor += S.heraldSpent;  /* returned, not granted: the total never moves */
  S.heralds = 0; S.heraldSeeds = 0; S.heraldSpent = 0;
  render(); save();
}
/* §7.4: the doors are billed in souls — the tithe spends the tithed */
function openSky() {
  if (S.worlds < WORLDS_PER_SKY || S.galaxy >= 2 || S.souls < skyCost()) return;
  S.souls -= skyCost();
  S.galaxy++;
  /* the door is narrow: of a gross of heralds, a dozen cross (§7.4) */
  if (S.heralds > 1) S.heralds = Math.max(1, Math.sqrt(S.heralds));
  S.worlds = 0; S.worldProg = 0; S.faint = 0; S.dimT = 0;  /* re-roll: 14 stars relight */
  render(); save();
}
/* §7.4: the last star is billed in the one thing the player believed was theirs */
function takeLastStar() {
  if (S.proj.last || S.galaxy !== 2 || S.worlds !== WORLDS_PER_SKY - 1 || S.heralds < 1) return;
  S.souls += worldSouls(WORLDS_PER_SKY - 1);
  S.worlds = WORLDS_PER_SKY;
  S.heralds = 0; S.heraldSeeds = 0; S.heraldSpent = 0; S.faint = 0; S.dimT = 0;
  S.proj.last = true; S.endState = 1;  /* every rate reads 0.0 from here */
  render(); save();
}
/* §8: begin again — the cycle is canon. the village will not remember; the count will */
function doHunger() {
  if (!S.endState || S.starved) return;  /* the refusal closes the offer */
  leaving = true;  /* the old world must not save itself on the way out */
  const u = (S.universes || 1) + 1;
  try { localStorage.setItem(U_KEY, String(u)); } catch (e) {}
  const next = fresh();
  next.seed = (mulberry32(S.seed ^ 0x9e3779b9)() * 2147483647) | 0;  /* the names reshuffle, deterministically */
  next.universes = u;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(next)); } catch (e) {}
  location.reload();  /* the next village boots the way the first one did */
}
/* §8: refuse — the quietings begin */
function doStarve() {
  if (!S.endState || S.starved) return;
  S.starved = 1;
  render(); save();
}
/* §8: the five quietings — each return wakes a dead store row with a single digit (law 23) */
function doQuiet(def) {
  if (S.quiet !== def.quiet - 1) return;  /* one at a time, in order */
  S.quiet = def.quiet;
  if (def.quiet === 1) S.vigil = false;   /* nothing dims — there is nothing left to take */
  if (def.quiet === 2) S.mir = {};        /* every multiplier dies */
  if (def.quiet === 5) S.favor = 0;       /* billed at exactly the balance (law 23) */
  if (def.ret) for (const k of Object.keys(def.ret)) S[k] = def.ret[k];
  render(); save();
}
/* §8: the last gathering — one click per fleck, the debt to the life (law 23) */
function doGather() {
  if (S.quiet < 5 || S.gather >= S.offerings) return;
  S.food += 1.0;
  S.gather++;
  render(); save();
}
/* the names the shrine consumed, in taken order — the watcher kept his (§8) */
function gatherName(i) {
  if (S.ratsIdx >= 0 && i >= S.ratsIdx) i++;
  return nameAt(i);
}
function buyMir(def) {
  const c = mirCost(def);
  if (def.repeat) {
    if (!canAfford(c)) return;
    pay(c); S.signs++;
    S.doubt = 0; S.doubtT = 0;  /* they remember why they kneel */
    applyTithe(); render(); save();
    return;
  }
  /* the hush expires with its sky (§7.3) — it can be asked for again under the next one */
  if (S.quiet >= 2) return;  /* §8: unmade is unmade */
  if ((def.hush ? hushActive() : S.mir[def.id]) || !canAfford(c)) return;
  pay(c); S.mir[def.id] = def.hush ? S.galaxy + 1 : true;
  render(); save();
}

function doOffering() {
  if (S.proj.tithe) {
    /* the button's second life: rungs of 1, 2, 4, 8 — each one point of faith, taken from a full village */
    if (S.deeper >= 4 || S.pop < cap()) return;
    const n = Math.pow(2, S.deeper);
    S.pop -= n;
    S.deeper++;
    S.doubt++;          /* each rung breeds one (law 15) */
    S.offerings += n;   /* the picture remembers each of them */
    S.nameIdx += n;     /* the names are kept, never shown — the order matters later */
    S.arriveCd = Math.max(S.arriveCd, arriveCdS());
    applyTithe(); render(); save();
    return;
  }
  /* after the first, the shrine takes only from a full village */
  if (S.pop < 1 || (S.offerings > 0 && S.pop < cap())) return;
  S.pop--; fixJobs();
  if (!S.turn1) {
    S.turn1 = true;   /* faith is born at 1 — one of them believed first */
    S.glowLock = Math.min(1, Math.log10(1 + S.totalFood + S.totalWood + S.totalStone) / 4);
  }
  grantFavor(offerYield());
  S.offerings++; S.nameIdx++;
  S.surgeLeft = SURGE.s;
  S.arriveCd = Math.max(S.arriveCd, arriveCdS());   /* the gap must be seen before it closes */
  render(); save();
}

function doAct(a) {
  if (a.gather && S.quiet >= 5) return doGather();  /* §8: the verb came back changed */
  if (a.die && a.die(S)) return;  /* the verb is dead */
  S[a.cur] += clickPower();
  S[TOT[a.cur]] += clickPower();
  S.clicks++;
  if (S.proj.fire) S.smokePhase += 0.5;
  S.walkPhase += 0.15;
  render();
}

/* ============================== reveal engine ============================== */

let booted = false;
function see(key, el, ghost) {
  if (!el) return;
  const cls = ghost ? "ghost" : "hidden";
  if (!el.classList.contains(cls)) return;
  el.classList.remove(cls);
  if (booted && !S.seen[key]) el.classList.add("reveal");
  S.seen[key] = 1;
}

function checkReveals() {
  if (S.clicks >= 1 || S.totalFood > 0) see("stores", els["sec-stores"]);
  if (S.totalWood > 0) see("row-wood", els["row-wood"]);
  if (S.totalStone > 0) see("row-stone", els["row-stone"]);
  if (S.turn1) see("row-favor", els["row-favor"]);
  if (S.legend > 0) see("row-legend", els["row-legend"], true);
  if (S.turn1) see("faith", els["faithLine"], true);
  for (const a of ACTS) {
    if (a.die && a.die(S)) { els[a.el].classList.add("ghost"); continue; }  /* molt 2: the verb dies, the slot holds */
    if (a.show && (S.seen["a:"+a.id] || a.show(S))) see("a:"+a.id, els[a.el], true);
  }
  if (S.proj.tithe) see("slider", els["sliderRow"], true);
  if (S.proj.tithe) see("earlyWorks", els["earlyWorks"]);
  /* molt 3: the souls row wakes from its boot-long ghost; the congregation folds */
  if (S.proj.ascend) see("row-souls", els["row-souls"], true);
  if (S.proj.ascend) see("congWorks", els["congWorks"]);
  if (S.pop > 0 || S.bld.hut > 0) see("village", els["sec-village"]);
  for (const j of JOBS) if (S.seen["j:"+j.id] || j.show(S)) see("j:"+j.id, els["job-"+j.id], true);

  /* rows rebuild on reload: keyed on the row's absence, not on seen */
  for (const def of PROJ) {
    if (!rowNodes["proj-"+def.id] && (S.seen["pp:"+def.id] || (def.show ? def.show(S) : true))) {
      const isNew = !S.seen["pp:"+def.id];
      if (def.id === "rats" && S.ratsIdx < 0) { S.ratsIdx = S.nameIdx; S.nameIdx++; }
      see("proj", els["sec-proj"]);
      els["projList"].appendChild(makeRow(def, "proj"));
      S.seen["pp:"+def.id] = 1;
      if (booted && isNew) rowNodes["proj-"+def.id].btn.classList.add("reveal");
    }
    if (def.id === "shrineX" && (S.totalStone >= 70 || S.seen["pp:shrineX"])) S.seen["p:shrineX"] = 1;
  }
  for (const def of BLD) {
    if (!rowNodes["bld-"+def.id] && (S.seen["bb:"+def.id] || def.show(S))) {
      const isNew = !S.seen["bb:"+def.id];
      see("bld", els["sec-bld"]);
      els["bldList"].appendChild(makeRow(def, "bld"));
      S.seen["bb:"+def.id] = 1;
      if (booted && isNew) rowNodes["bld-"+def.id].btn.classList.add("reveal");
    }
  }
  for (const def of MIR) {
    if (!rowNodes["mir-"+def.id] && (S.seen["mm:"+def.id] || def.show(S))) {
      const isNew = !S.seen["mm:"+def.id];
      see("mir", els["sec-mir"]);
      els["mirList"].appendChild(makeRow(def, "mir"));
      S.seen["mm:"+def.id] = 1;
      if (booted && isNew) rowNodes["mir-"+def.id].btn.classList.add("reveal");
    }
  }
  if (S.proj.shrineX) see("shrine", els["sec-shrine"]);
}

/* ============================== render ============================== */

const lex = id => { const l = LEX.find(x=>x.id===id); if (!l) return "";
  return (S.turn1 && !(l.dawn && S.quiet >= 5)) ? l.post : l.pre; };  /* §8: the first verb returns */
let lastSpread = -1;
let lastSpreadW = -1;

/* the one-time tease gives way to the rate: the line stays, the words earn their keep */
function effLine(def) {
  const e = def.eff || {};
  const trim = n => n.toFixed(2).replace(/0$/, "").replace(/\.0$/, "");
  if (e.cap)     return "room for " + (S.bld[def.id] * e.cap);
  if (e.job)     return JOBS.find(x => x.id === e.job).name + "s ×" + trim(1 + e.per * S.bld[def.id]);
  if (e.allJobs) return "hands ×" + trim(e.allJobs);
  if (e.out)     return e.out + " ×" + e.x;
  if (e.arrive)  return "arrivals ×" + trim(1 / e.arrive);
  if (e.offline) return "away · " + e.offline + " h";
  if (e.decimal) return "to the tenth";
  return "";
}

function setText(el, txt) { if (el && el.textContent !== txt) el.textContent = txt; }

function render() {
  checkReveals();

  /* §8: the quietings wake the dead rows one by one — the refund punchline (law 23) */
  setText(els["foodVal"], S.proj.ascend && S.quiet < 2 ? "" : fmtStore(S.food));
  setText(els["woodVal"], S.proj.tithe && S.quiet < 5 ? "" : fmtStore(S.wood));
  setText(els["stoneVal"], S.proj.tithe && S.quiet < 4 ? "" : fmtStore(S.stone));
  /* the count: precision as dread — the bank stops rounding when it matters most */
  setText(els["favorVal"], S.proj.count ? S.favor.toFixed(1) : fmtStore(S.favor));
  setText(els["foodRate"], !S.proj.ascend && (S.pop > 0 || prodOf("food") > 0) ? fmtRate(rateOf("food")) : "");
  setText(els["woodRate"], !S.proj.tithe && prodOf("wood") > 0 ? fmtRate(rateOf("wood")) : "");
  setText(els["stoneRate"], !S.proj.tithe && prodOf("stone") > 0 ? fmtRate(rateOf("stone")) : "");
  /* molt 2: wood and stone leave the ledger; molt 3 takes the larder the same way */
  els["row-wood"].classList.toggle("ghost", !!S.proj.tithe && S.quiet < 5);
  els["row-stone"].classList.toggle("ghost", !!S.proj.tithe && S.quiet < 4);
  els["row-food"].classList.toggle("ghost", !!S.proj.ascend && S.quiet < 2);
  /* the stall is a readout, not an absence: the rate reads zero until cured.
     after the last star the zero is permanent — the first zero that will never move (§8) */
  setText(els["favorRate"], S.endState ? "0.0/s" : stalled() ? fmtRate(0)
    : prodOf("favor") > 0 && (S.proj.ascend || S.favor < favorCap()) ? fmtRate(rateOf("favor")) : "");
  setText(els["legendVal"], fmtStore(S.legend));
  setText(els["legendRate"], S.turn1 && !S.proj.ascend && S.favor >= favorCap() ? fmtRate(LEGEND_RATE) : "");
  setText(els["soulsVal"], S.proj.ascend ? fmt(S.souls, !!S.proj.count) : "");
  setText(els["soulsRate"], S.endState ? "0.0/s" : "");
  /* the ceiling shown long before it is reachable is the standing threat (law 2) */
  setText(els["faithLine"], S.turn1 ? "faith " + faithOf() + (S.proj.lights ? " / " + FAITH_MAX : "") : "");

  setText(els["h-act"], lex("h-act"));
  setText(els["act-berries"], lex("act-berries"));
  setText(els["act-wood"], lex("act-wood"));
  /* §8: the gathering — N names in taken order, then the hill's one sentence */
  els["act-berries"].disabled = S.quiet >= 5 && S.gather >= S.offerings;
  setText(els["actTease"], S.quiet < 5 ? ""
    : S.gather >= S.offerings ? GATHER.end
    : S.gather > 0 ? GATHER.line(gatherName(S.gather - 1)) : "");
  setText(els["h-village"], lex("h-village"));
  setText(els["h-shrine"], lex("h-shrine"));
  let pl;
  if (S.proj.ascend) {
    /* the stamp (§4): sixty seconds of epitaph, then the board */
    pl = S.tithedLine > 0 ? "the first village: tithed"
       : "worlds " + S.worlds + " / " + WORLDS_PER_SKY + " · souls " + fmt(S.souls);
  } else {
    pl = lex("popWord") + " " + S.pop + " / " + cap() +
      (S.proj.tithe ? " · congregation " + deriveJobs().cong : " · idle " + idle());
    if (S.proj.fire && S.pop < cap() && S.food < arriveAt())
      pl += " · next at " + fmt(arriveAt()) + " food";
    pl += " · " + moodWord();  /* law 22: the word walks down, never announced */
  }
  setText(els["popLine"], pl);

  for (const j of JOBS) {
    setText(els["jn-"+j.id], String(S.jobs[j.id]));
    els["jp-"+j.id].disabled = !!S.proj.tithe || idle() < 1 || S.jobs[j.id] >= jobCapOf(j.id);
    els["jm-"+j.id].disabled = !!S.proj.tithe || S.jobs[j.id] < 1;
    if (S.proj.ascend) els["job-"+j.id].classList.add("ghost");  /* molt 3: the rows blank, the slots hold */
  }
  /* molt 3: the same dial, new ends — spread converts, reap collects */
  setText(els["sendL"], S.proj.ascend ? "spread" : "fields");
  setText(els["sendR"], S.proj.ascend ? "reap" : "shrine");
  const slbl = S.proj.ascend ? "spread to reap" : "fields to shrine";
  if (els["slider"].getAttribute("aria-label") !== slbl) els["slider"].setAttribute("aria-label", slbl);
  if (S.proj.tithe) {
    const v = String(Math.round(S.slider * 100));
    if (els["slider"].value !== v) els["slider"].value = v;
  }
  els["slider"].disabled = S.quiet >= 3;  /* §8: the tithe closes — the dial greys forever */

  /* §8: the strip wakes when the count speaks — and never sleeps again */
  setText(els["uniLine"],
    (S.universes > 1 || (S.endState && S.endT >= VOICE_S * 2)) ? "universe " + S.universes : "");

  for (const key of Object.keys(rowNodes)) {
    const r = rowNodes[key], def = r.def;
    if (r.kind === "bld" && def.herald) {
      /* §7.2: at the cap the row reads `heralds 144` and the cost text empties */
      const capped = S.heralds >= HERALD.cap;
      setText(r.nm, capped ? "heralds" : def.name);
      setText(r.ct, S.heralds >= 1 ? fmt(Math.floor(S.heralds)) : "");
      setText(r.co, capped || S.endState ? "" : costText(heraldCost()));
      r.btn.disabled = capped || S.endState || !canAfford(heraldCost());
      if (S.seen.heraldT) setText(r.tease, "");
    } else if (r.kind === "bld" && def.recall) {
      /* the column reads what comes back: 100% of the seed cost (law 14) */
      setText(r.co, S.heraldSeeds > 0 ? costText({ favor: S.heraldSpent }) : "");
      r.btn.disabled = S.heraldSeeds < 1;
    } else if (r.kind === "bld" && def.vigil) {
      /* §7.3: the price is per second; the count column says whether it is being paid.
         §8: lapsed, it asks for nothing — nothing dims; there is nothing left to take */
      setText(r.ct, S.quiet < 1 && S.vigil ? "held" : "");
      setText(r.co, S.quiet >= 1 || hushActive() ? "" : fmt(vigilCost()) + " favor/s");
      r.btn.disabled = S.quiet >= 1;
    } else if (r.kind === "proj" && def.sky) {
      /* §7.4: the same row, mutated price — two doors, then a dead line under the third sky */
      setText(r.ct, "");
      setText(r.co, S.galaxy >= 2 ? "" : costText({ souls: skyCost() }));
      r.btn.disabled = S.galaxy >= 2 || S.worlds < WORLDS_PER_SKY || S.souls < skyCost();
      if (S.galaxy > 0) setText(r.tease, "");  /* the dark answered once; the flavor is spent */
    } else if (r.kind === "proj" && def.last) {
      /* §7.4: the price column says what it costs; the wallet cannot audit children */
      setText(r.ct, "");
      setText(r.co, S.proj.last ? def.done : def.costLine);
      r.btn.disabled = !!S.proj.last || S.galaxy !== 2 || S.worlds !== WORLDS_PER_SKY - 1 || S.heralds < 1;
    } else if (r.kind === "proj" && (def.voice || def.hunger || def.starve)) {
      /* §8: the price column is empty — the economy is over and someone is speaking */
      setText(r.ct, "");
      setText(r.co, "");
      /* the choice stands open until either answer is given; then both close */
      r.btn.disabled = !!def.voice || S.starved > 0;
    } else if (r.kind === "proj" && def.quiet) {
      /* §8: cost-less, one at a time — except the last, billed at exactly the balance (law 23) */
      setText(r.ct, "");
      setText(r.co, S.quiet >= def.quiet ? "" : def.costLine ? def.costLine(S) : "");
      r.btn.disabled = S.quiet !== def.quiet - 1;
    } else if (r.kind === "bld") {
      const atMax = def.max && S.bld[def.id] >= def.max;
      const c = bldCost(def);
      setText(r.ct, S.bld[def.id] > 0 ? String(S.bld[def.id]) : "");
      /* molt 2 freezes the works: counts remain, costs vanish */
      setText(r.co, (atMax || S.proj.tithe) ? "" : costText(c));
      r.btn.disabled = atMax || !!S.proj.tithe || !canAfford(c);
      if (S.bld[def.id] > 0) setText(r.tease, effLine(def));
      r.wrap.classList.toggle("ghost", !!S.proj.ascend);  /* molt 3: the works go dark */
    } else {
      const done = r.kind === "proj" ? S.proj[def.id] : (def.hush ? hushActive() : S.mir[def.id]);
      /* wood and stone died at molt 2: anything still priced in them is stranded */
      const dead = r.kind === "proj" && S.proj.tithe && !done && def.cost && !!(def.cost.wood || def.cost.stone);
      const c = r.kind === "mir" ? mirCost(def) : def.cost;
      setText(r.ct, "");
      /* ascension states its price in three terms; the wallet audits two of them */
      setText(r.co, done ? (def.done || "done") : (def.costLine || costText(c)));
      r.btn.disabled = done || !def.cost || dead || !canAfford(c) || !!(def.audit && !def.audit(S));
      if (done) setText(r.tease, effLine(def));
      if (def.repeat && S.signs > 0) setText(r.tease, "");  /* the tease spends itself on the first sign */
      /* the early works fold into one line; the congregation folds the same way */
      if (r.kind === "proj" && def.act === 1) r.wrap.classList.toggle("hidden", !!S.proj.tithe);
      if (r.kind === "proj" && def.act === 2) r.wrap.classList.toggle("hidden", !!S.proj.ascend);
      /* molt 3: the old miracles blank; act 3's arrive lit in the same list.
         §8: unmade, they all blank — every multiplier is dead */
      if (r.kind === "mir") r.wrap.classList.toggle("ghost",
        (!!S.proj.ascend && def.act !== 3) || S.quiet >= 2);
    }
  }

  if (S.seen["shrine"]) {
    if (S.proj.tithe) {
      /* the button transmutes in place: a number where the name was */
      setText(els["offer"], "a deeper offering — " + Math.pow(2, Math.min(S.deeper, 3)));
      els["offer"].disabled = S.deeper >= 4 || S.pop < cap();
      setText(els["shrineTease"], S.asideLeft > 0 ? ASIDE.text : "");
      setText(els["surgeLine"], "");
      els["surgeLine"].classList.add("hidden");  /* the surge line retires; faith takes its slot */
    } else {
      setText(els["offer"], "an offering — " + nextName());
      /* after the first, the shrine takes only from a full village */
      els["offer"].disabled = S.pop < 1 || (S.offerings > 0 && S.pop < cap());
      /* the sentence lives exactly as long as the gift */
      setText(els["shrineTease"],
        S.turn1 ? (S.offerings === 1 && S.surgeLeft > 0 ? "they were never your hands." : "") : "it was waiting.");
      /* the deal is on the table before the first click; afterwards, the clock runs */
      const left = Math.ceil(S.surgeLeft);
      const terms = "yield ×" + SURGE.x + " · ";
      setText(els["surgeLine"], left > 0 ? terms + left + "s"
        : (S.turn1 ? "next · " + fmt(offerYield()) + " favor" : terms + SURGE.s + "s"));
    }
  }

  if (S.offerings !== lastSpread) {
    lastSpread = S.offerings;
    for (const sp of SPREAD) if (S.offerings >= sp.at)
      document.querySelectorAll(sp.sel).forEach(n => n.classList.add("blood"));
  }
  const wc = S.galaxy * WORLDS_PER_SKY + S.worlds;  /* monotonic across the doors */
  if (wc !== lastSpreadW) {
    lastSpreadW = wc;
    for (const sp of SPREAD_W) if (wc >= sp.at)
      document.querySelectorAll(sp.sel).forEach(n => n.classList.add("blood"));
  }

  paint();
}

/* ============================== tick ============================== */

function tick() {
  const now = Date.now();
  let dt = (now - S.last) / 1000;
  S.last = now;
  if (dt <= 0) return;
  if (dt > capS()) dt = capS();
  applyTithe();  /* after the molt the slider holds the rows, every tick */

  if (motionOK()) {
    S.walkPhase += dt * (surgeMult() > 1 ? 2.2 : 1);
    S.smokePhase += dt * smokeRate() * 0.4;
  }

  /* law 15: favor flows only until the stall lands, even across one long tick */
  let favDt = dt;
  if (stalled()) favDt = 0;
  else if (S.proj.tithe && S.doubt > 0) {
    const k = Math.ceil(S.pop / 2 - S.doubt);  /* doubts still to come before half the stock */
    favDt = Math.min(dt, Math.max(0, k * DOUBT_S - S.doubtT));
  }

  /* the surge pays exactly its seconds, even across one long tick */
  const sDt = Math.min(dt, Math.max(0, S.surgeLeft));
  for (const cur of CURS) {
    const gain = cur === "favor" ? prodOf(cur, false) * favDt
      : (sDt > 0 ? prodOf(cur, true) * sDt : 0) + prodOf(cur, false) * (dt - sDt);
    if (gain > 0) {
      if (cur === "favor") grantFavor(gain);
      else { S[cur] += gain; S[TOT[cur]] += gain; }
    }
  }
  /* heresy compounds: while any doubt remains, one more every ninety seconds */
  if (S.doubt > 0) {
    S.doubtT += dt;
    while (S.doubtT >= DOUBT_S) { S.doubtT -= DOUBT_S; S.doubt++; }
    applyTithe();
  } else S.doubtT = 0;
  /* the one aside the game ever volunteers (law 17) */
  if (!S.aside && S.proj.tithe && prodOf("favor") > prodOf("food")) { S.aside = true; S.asideLeft = ASIDE.s; }
  if (S.asideLeft > 0) S.asideLeft = Math.max(0, S.asideLeft - dt);
  /* legend: the god must sit still to be storied — and never again after the molt */
  if (S.turn1 && !S.proj.ascend && S.favor >= favorCap()) S.legend += LEGEND_RATE * dt;

  /* act 3 — the board (§7.1): spread converts and replicates; reap was paid above.
     after the last star there is nothing left to spread to (§8) */
  if (S.proj.ascend && !S.endState) {
    if (S.tithedLine > 0) S.tithedLine = Math.max(0, S.tithedLine - dt);
    const sp = 1 - S.slider;
    if (S.heralds > 0 && sp > 0) {
      S.heralds = Math.min(HERALD.cap, S.heralds + HERALD.grow * S.heralds * sp * dt);
      /* §7.4: in the third sky the heralds stop one short — the last star is taken by hand */
      const lim = WORLDS_PER_SKY - (S.galaxy === 2 ? 1 : 0);
      if (S.worlds < lim) {
        S.worldProg += S.heralds * sp * dt * convMult() * uMult();
        /* a dimmed world costs double — a stall, never a loss (§7.1) */
        while (S.worlds < lim &&
               S.worldProg >= worldNeed(S.worlds) * (S.faint > 0 ? SILENCE.mult : 1)) {
          S.worldProg -= worldNeed(S.worlds) * (S.faint > 0 ? SILENCE.mult : 1);
          S.souls += worldSouls(S.worlds);
          S.worlds++;  /* the star turns red on the same render */
          if (S.faint > 0) S.faint--;  /* relit by being taken */
        }
      }
    }
    /* §7.3: born at the fifth world — one light goes faint between two renders. no text. */
    if (!S.silenceBorn && S.worlds >= SILENCE.born) {
      S.silenceBorn = true; S.dimT = 0;
      S.faint = Math.min(1, WORLDS_PER_SKY - S.worlds);
    }
    if (S.silenceBorn) {
      S.silenceT += dt;
      const vc = hushActive() ? 0 : vigilCost() * dt;
      if (S.vigil && S.favor >= vc) { S.favor -= vc; S.dimT = 0; }  /* held: zero losses */
      else {
        if (S.vigil) S.vigil = false;  /* the treasury starves and the vigil lapses */
        S.dimT += dt;
        while (S.dimT >= SILENCE.every && S.faint < WORLDS_PER_SKY - S.worlds) {
          S.dimT -= SILENCE.every; S.faint++;
        }
        if (S.faint >= WORLDS_PER_SKY - S.worlds) S.dimT = 0;  /* nothing left to take */
      }
    }
  }
  /* §8: after the last star the only thing still moving is the speaker's clock */
  if (S.endState) S.endT += dt;
  S.surgeLeft = Math.max(0, S.surgeLeft - dt);
  if (S.pop > 0 || S.jobs.p > 0) S.food = Math.max(0, S.food - upkeep() * dt);
  if (ratsDrain() > 0) S.food = Math.max(0, S.food - RATS_DRAIN * dt);

  /* arrivals: the fire draws them; the food keeps them; they simply come.
     only an offering leaves a gap on the road (arriveCd is set nowhere else).
     after ascension no road leads here anymore */
  S.arriveCd = Math.max(0, S.arriveCd - dt);
  if (!S.proj.ascend && S.proj.fire && S.pop < cap() && S.food >= arriveAt() && S.arriveCd === 0) S.pop++;

  /* an empty larder: one walks into the treeline (never dies) */
  if (S.pop > 0 && S.food <= 0 && upkeep() + ratsDrain() > prodOf("food")) {
    S.starveT += dt;
    if (S.starveT >= LEAVE_S) { S.pop--; fixJobs(); S.starveT = 0; }
  } else if (S.food > 0) S.starveT = 0;

  render();
}

/* ============================== save / load ============================== */

let leaving = false;  /* a reload on purpose — beforeunload must not re-save the old world */
function save() {
  if (leaving) return;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {}
}
function wipe() {
  if (!confirm("wipe the save?")) return;
  leaving = true;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  location.reload();
}
function doExport() {
  try { prompt("copy this:", btoa(JSON.stringify(S))); } catch (e) {}
}
function doImport() {
  try {
    const p = prompt("paste a save:");
    if (!p) return;
    const parsed = migrate(JSON.parse(atob(p.trim())));
    leaving = true;
    localStorage.setItem(SAVE_KEY, JSON.stringify(parsed));
    location.reload();
  } catch (e) {}
}

/* ============================== wiring ============================== */

els["act-berries"].addEventListener("click", () => doAct(ACTS[0]));
els["act-wood"].addEventListener("click", () => doAct(ACTS[1]));
els["offer"].addEventListener("click", doOffering);
for (const j of JOBS) {
  els["jp-"+j.id].addEventListener("click", () => {
    if (S.proj.tithe) return;  /* readouts now */
    if (idle() > 0 && S.jobs[j.id] < jobCapOf(j.id)) { S.jobs[j.id]++; render(); } });
  els["jm-"+j.id].addEventListener("click", () => {
    if (!S.proj.tithe && S.jobs[j.id] > 0) { S.jobs[j.id]--; render(); } });
}
els["slider"].addEventListener("input", () => {
  S.slider = Math.max(0, Math.min(1, Number(els["slider"].value) / 100));
  applyTithe(); render();
});
$("mSave").addEventListener("click", e => { e.preventDefault(); save(); });
$("mExport").addEventListener("click", e => { e.preventDefault(); doExport(); });
$("mImport").addEventListener("click", e => { e.preventDefault(); doImport(); });
$("mWipe").addEventListener("click", e => { e.preventDefault(); wipe(); });
document.addEventListener("visibilitychange", () => { if (document.hidden) save(); });
window.addEventListener("beforeunload", save);
window.addEventListener("resize", () => { paintKey = ""; paint(); });

/* offline catch-up happens through the same clamp in tick() */
render();
booted = true;
setInterval(tick, 100);
setInterval(save, 10000);

/* ============================== debug handle ============================== */

window.__tithe = {
  get state() { return S; },
  tick, render, save, migrate, fresh,
  JOBS, BLD, PROJ, MIR, NAMES, LEX, SPREAD, SPREAD_W, MOOD, ANCHORS, SITES, PAL,
  UPKEEP, ARRIVE, ARRIVE_CD, SURGE, OFFER, LEAVE_S, RATS_DRAIN,
  FAITH_GATES, FAITH_MAX, FAVOR_CAP_PER, LEGEND_RATE, DOUBT_S, ASIDE,
  TITHED_S, HERALD, WORLDS_PER_SKY, WORLD, SOUL, SKY_MULT, REAP_RATE, SILENCE, VIGIL_RATE, SKY_DOOR,
  VOICE_S, NGPLUS, SAVE_VER,
  buyBld, buyProj, buyMir, doOffering, fixJobs, ascend, buyHerald, recallHeralds, openSky, takeLastStar,
  doHunger, uMult, doStarve, doQuiet, doGather, gatherName, GATHER, moodWord,
  heraldCost, worldNeed, worldSouls, reapRate, vigilCost, hushActive, convMult, skyCost,
  faithOf, favorCap, grantFavor, jobCapOf, deriveJobs, applyTithe, congRate, stalled, mirCost,
  jobRate, prodOf, rateOf, upkeep, ratsDrain, totalProd, cap, idle, arriveAt, offerYield,
  bldCost, canAfford, costText, surgeMult, capS, clickPower, mirArrive, jobArrive, projArrive, arriveCdS, projOutMult, effLine,
  smokeRate, glowT, redT, nextName, nameAt,
  genVillage, villageScene, fmt, fmtStore, fmtRate, mulberry32,
};
</script>
